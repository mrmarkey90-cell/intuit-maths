  <!-- ================================================================
       AVATAR RIG GUIDE -- reference only, never ships as a game asset.
       Canvas: 200 x 300, shared by every layer (body, hair, hats,
       clothing).

       Head is WIDER than the body and the two are directly connected
       -- no neck segment. The torso's top edge tucks up underneath the
       head circle's curve (inside its radius), so when the head paints
       on top of the torso in z-order, it fully covers the join and the
       two read as one continuous connected shape, the way the
       Cyanide & Happiness reference does it.

       Body is otherwise simple and symmetric -- no 3/4 perspective, no
       near/far limb split. Facing direction (screen-right, per the
       Slay the Spire reference -- player left, enemies right) is sold
       through hair shape and facial feature placement (eyes/eyebrows/
       mouth angled or offset, all procedural/code-side) rather than
       any change to this rig.

       Draw your asset directly on top of this file in Inkscape, using
       the shapes/crosshairs for alignment, then delete the "guides"
       group, the "labels" group, and the backdrop rect below --
       before saving your real asset, nothing from this file should
       remain except what you drew.
       ================================================================ -->
