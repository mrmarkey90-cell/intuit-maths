<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 140">
  <!-- Stars (dazed) -->
  <text x="2" y="22" font-size="16" fill="#FFD700">★</text>
  <text x="82" y="18" font-size="16" fill="#FFD700">★</text>
  <text x="44" y="10" font-size="12" fill="#FFD700">★</text>
  <!-- Arms flopped out -->
  <path d="M 10 88 Q 22 70 30 72" stroke="#8a6a4a" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 90 88 Q 78 70 70 72" stroke="#8a6a4a" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Body (squished/wider) -->
  <ellipse cx="50" cy="124" rx="38" ry="20" fill="#8a6a4a"/>
  <!-- Head (squished flat) -->
  <ellipse cx="50" cy="94" rx="34" ry="18" fill="#9a7a5a"/>
  <!-- Snout -->
  <ellipse cx="50" cy="101" rx="13" ry="7" fill="#c49a70"/>
  <!-- Nostrils -->
  <circle cx="44" cy="100" r="2.5" fill="#4a2e18"/>
  <circle cx="56" cy="100" r="2.5" fill="#4a2e18"/>
  <!-- X eyes -->
  <line x1="28" y1="82" x2="40" y2="92" stroke="#1a1a2e" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="40" y1="82" x2="28" y2="92" stroke="#1a1a2e" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="60" y1="82" x2="72" y2="92" stroke="#1a1a2e" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="72" y1="82" x2="60" y2="92" stroke="#1a1a2e" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Ears (splayed) -->
  <ellipse cx="18" cy="86" rx="10" ry="7" fill="#8a6a4a" transform="rotate(-20, 18, 86)"/>
  <ellipse cx="82" cy="86" rx="10" ry="7" fill="#8a6a4a" transform="rotate(20, 82, 86)"/>
  <ellipse cx="18" cy="86" rx="6" ry="4" fill="#d48c80" transform="rotate(-20, 18, 86)"/>
  <ellipse cx="82" cy="86" rx="6" ry="4" fill="#d48c80" transform="rotate(20, 82, 86)"/>
