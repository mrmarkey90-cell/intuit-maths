<svg width="600" height="900" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">

  <!-- ================================================================
       AVATAR RIG GUIDE -- reference only, never ships as a game asset.
       Canvas: 200 x 300, shared by every layer (body, hair, hats,
       clothing).

       Body is simple and symmetric -- no 3/4 perspective, no near/far
       limb split. Facing direction (screen-right, per the Slay the
       Spire reference -- player left, enemies right) is sold entirely
       through hair shape and facial feature placement (eyes/eyebrows/
       mouth angled or offset), the same way Cyanide & Happiness does
       it. Eyes/eyebrows/mouth are procedural (code-side), so that part
       needs no asset from you -- just keep hairstyles free to lean
       into a directional look if you want one (e.g. a side-swept
       fringe), it's optional per style, not a rig requirement.

       Torso width is fixed at 80 -- the same as the head's diameter
       (r=40) -- so the body reads as one consistent column width,
       edge-aligned with the head circle.

       Draw your asset directly on top of this file in Inkscape, using
       the shapes/crosshairs for alignment, then delete the "guides"
       group, the "labels" group, and the backdrop rect below --
       before saving your real asset, nothing from this file should
       remain except what you drew.
       ================================================================ -->

  <!-- Backdrop -->
  <rect x="0" y="0" width="200" height="300" fill="#fafafa"/>

  <g id="guides" stroke="#9ca3af" fill="none" stroke-dasharray="3 2">
    <!-- Center reference line -->
    <line x1="100" y1="0" x2="100" y2="300" stroke-dasharray="2 4"/>

    <!-- Head -->
    <circle cx="100" cy="70" r="40"/>

    <!-- Torso: simple rectangle, width 80 == head diameter, edges
         aligned with the head circle's own left/right extent -->
    <rect x="60" y="110" width="80" height="90"/>

    <!-- Arms -- symmetric, single z-layer (in front of torso) -->
    <line x1="60" y1="120" x2="50" y2="190" stroke="#16a34a"/>
    <line x1="140" y1="120" x2="150" y2="190" stroke="#16a34a"/>

    <!-- Legs -- symmetric, single z-layer, narrower stance than the torso -->
    <line x1="75" y1="195" x2="70" y2="290" stroke="#16a34a"/>
    <line x1="125" y1="195" x2="130" y2="290" stroke="#16a34a"/>
  </g>

  <!-- Anchor point markers + labels -->
  <g id="labels" font-size="6" fill="#1f2937" stroke="none">
    <circle cx="100" cy="70" r="2" fill="#dc2626"/>
    <text x="103" y="50">head (100,70) r=40 -- spans x=60 to x=140</text>

    <circle cx="60" cy="120" r="2" fill="#16a34a"/>
    <text x="6" y="113">shoulder (60,120)</text>

    <circle cx="140" cy="120" r="2" fill="#16a34a"/>
    <text x="143" y="113">shoulder (140,120)</text>

    <circle cx="75" cy="195" r="2" fill="#16a34a"/>
    <text x="20" y="190">hip (75,195)</text>

    <circle cx="125" cy="195" r="2" fill="#16a34a"/>
    <text x="130" y="190">hip (125,195)</text>

    <text x="6" y="225">Torso: x 60-140 (width 80, == head</text>
    <text x="6" y="232">diameter), y 110-200</text>

    <text x="6" y="250">Facing direction: sold by hair shape +</text>
    <text x="6" y="257">eye/eyebrow placement only -- body stays</text>
    <text x="6" y="264">symmetric (Cyanide &amp; Happiness approach)</text>

    <text x="6" y="290" fill="#6b7280">Canvas: 0 0 200 300 -- export every asset at this full size</text>
  </g>

</svg>
