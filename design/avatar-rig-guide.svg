<svg width="600" height="900" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">

  <!-- ================================================================
       AVATAR RIG GUIDE -- reference only, never ships as a game asset.
       Canvas: 200 x 300, shared by every layer (body, hair, hats,
       clothing).

       Head is WIDER than the body and the two are directly connected
       -- no neck segment. The torso's top edge tucks up underneath the
       head circle's curve (inside its radius), so when the head paints
       on top of the torso in z-order, it fully covers the join and the
       two read as one continuous connected shape, the way the
       Cyanide & Happiness reference does it.

       Body is otherwise simple and symmetric -- no 3/4 perspective, no
       near/far limb split. Facing direction (screen-right, per the
       Slay the Spire reference -- player left, enemies right) is sold
       through hair shape and facial feature placement (eyes/eyebrows/
       mouth angled or offset, all procedural/code-side) rather than
       any change to this rig.

       Draw your asset directly on top of this file in Inkscape, using
       the shapes/crosshairs for alignment, then delete the "guides"
       group, the "labels" group, and the backdrop rect below --
       before saving your real asset, nothing from this file should
       remain except what you drew.
       ================================================================ -->

  <!-- Backdrop -->
  <rect x="0" y="0" width="200" height="300" fill="#fafafa"/>

  <g id="guides" stroke="#9ca3af" fill="none" stroke-dasharray="3 2">
    <!-- Center reference line -->
    <line x1="100" y1="0" x2="100" y2="300" stroke-dasharray="2 4"/>

    <!-- Head -- wider than the torso -->
    <circle cx="100" cy="75" r="45"/>

    <!-- Torso: narrower than the head (60 vs 90 diameter), top edge at
         y=100 tucks well inside the head circle's curve (verified: the
         rectangle's top corners are ~39 units from the head's center,
         comfortably inside the r=45 head) -- this overlap is what
         makes head + body read as connected, not a gap to close later -->
    <rect x="70" y="100" width="60" height="90"/>

    <!-- Arms -- symmetric, single z-layer (in front of torso), pivot
         placed where the torso is already clear of the head's curve -->
    <line x1="70" y1="125" x2="60" y2="190" stroke="#16a34a"/>
    <line x1="130" y1="125" x2="140" y2="190" stroke="#16a34a"/>

    <!-- Legs -- symmetric, single z-layer, narrower stance than the torso -->
    <line x1="80" y1="185" x2="75" y2="290" stroke="#16a34a"/>
    <line x1="120" y1="185" x2="125" y2="290" stroke="#16a34a"/>
  </g>

  <!-- Anchor point markers + labels -->
  <g id="labels" font-size="6" fill="#1f2937" stroke="none">
    <circle cx="100" cy="75" r="2" fill="#dc2626"/>
    <text x="103" y="55">head (100,75) r=45 -- spans x=55 to x=145</text>

    <circle cx="70" cy="125" r="2" fill="#16a34a"/>
    <text x="6" y="118">shoulder (70,125)</text>

    <circle cx="130" cy="125" r="2" fill="#16a34a"/>
    <text x="133" y="118">shoulder (130,125)</text>

    <circle cx="80" cy="185" r="2" fill="#16a34a"/>
    <text x="25" y="180">hip (80,185)</text>

    <circle cx="120" cy="185" r="2" fill="#16a34a"/>
    <text x="125" y="180">hip (120,185)</text>

    <text x="6" y="218">Torso: x 70-130 (width 60, narrower than the</text>
    <text x="6" y="225">head's 90), y 100-190 -- top edge overlaps</text>
    <text x="6" y="232">under the head circle, hidden once the head</text>
    <text x="6" y="239">paints on top -- this is the "no neck" join</text>

    <text x="6" y="258">Facing direction: sold by hair shape +</text>
    <text x="6" y="265">eye/eyebrow placement only -- body stays</text>
    <text x="6" y="272">symmetric (Cyanide &amp; Happiness approach)</text>

    <text x="6" y="290" fill="#6b7280">Canvas: 0 0 200 300 -- export every asset at this full size</text>
  </g>

</svg>
